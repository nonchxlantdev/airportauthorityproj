name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Verify Supabase secrets
        run: |
          if [ -z "${{ secrets.VITE_SUPABASE_URL }}" ] || [ -z "${{ secrets.VITE_SUPABASE_ANON_KEY }}" ]; then
            echo "::error::Add VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY as repository secrets before deploying."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STAFF_POSITIONS_TABLE: staff_positions
          VITE_MAP_TILE_URL_TEMPLATE: https://tile.openstreetmap.org/{z}/{x}/{y}.png
          VITE_MAP_TILE_URL_REGEX: ^https://tile\.openstreetmap\.org/
          VITE_MAP_BOUNDS_NORTH: "17.56"
          VITE_MAP_BOUNDS_SOUTH: "17.515"
          VITE_MAP_BOUNDS_EAST: "-88.275"
          VITE_MAP_BOUNDS_WEST: "-88.325"
          VITE_MAP_MIN_ZOOM: "14"
          VITE_MAP_MAX_ZOOM: "18"
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
